name: Wiki Sync

# Publishes docs/wiki/** to the repository's GitHub wiki whenever it changes on main.
# docs/wiki is the source of truth: pages removed there are removed from the wiki too.
on:
  push:
    branches:
      - main
    paths:
      - 'docs/wiki/**'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: wiki-sync
  cancel-in-progress: false

jobs:
  sync:
    name: Publish docs/wiki to the GitHub wiki
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Sync pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          git clone "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.wiki.git" /tmp/wiki
          rsync -a --delete --exclude '.git' docs/wiki/ /tmp/wiki/
          cd /tmp/wiki
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "Wiki already up to date."
            exit 0
          fi
          git commit -m "Sync wiki from docs/wiki @ ${GITHUB_SHA}"
          git push
