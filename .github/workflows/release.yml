name: Release

# Every git tag matching v* triggers a full release build: signs the APK, generates release
# notes, and publishes a GitHub Release with the APK, the R8 mapping file, and SHA-256 checksums.
# workflow_dispatch allows triggering a release manually when tag-push is unavailable.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to create and release (e.g. v23.3). Must not already exist.'
        required: true
        type: string
      tag_message:
        description: 'Annotated tag message / release codename (e.g. Shangri-La)'
        required: true
        type: string
      base_ref:
        description: 'Branch or SHA to tag (defaults to main)'
        required: false
        default: main
        type: string

permissions:
  contents: write

jobs:
  release:
    name: Build, sign & publish release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0 # full history so release notes can diff against the previous tag
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.base_ref || github.ref }}

      - name: Create and push annotated tag (dispatch only)
        if: github.event_name == 'workflow_dispatch'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ inputs.tag }}" -m "${{ inputs.tag_message }}"
          git push origin "${{ inputs.tag }}"
          echo "GITHUB_REF_NAME=${{ inputs.tag }}" >> "$GITHUB_ENV"

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Decode signing keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$KEYSTORE_BASE64" ]; then
            echo "::error::RELEASE_KEYSTORE_BASE64 secret is not set"; exit 1
          fi
          echo "$KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/orbin-release.jks"
          echo "ORBIN_KEYSTORE_FILE=$RUNNER_TEMP/orbin-release.jks" >> "$GITHUB_ENV"

      - name: Build signed release APK
        env:
          ORBIN_KEYSTORE_PASSWORD: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
          ORBIN_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          ORBIN_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: ./gradlew assembleRelease

      - name: Locate artifacts and compute checksums
        id: artifacts
        run: |
          set -euo pipefail
          APK=$(find app/build/outputs/apk/release -name '*.apk' | head -n1)
          MAPPING=$(find app/build/outputs/mapping/release -name 'mapping.txt' | head -n1 || true)
          mkdir -p release-staging
          VERSION="${GITHUB_REF_NAME}"
          cp "$APK" "release-staging/orbin-${VERSION}.apk"
          ( cd release-staging && sha256sum "orbin-${VERSION}.apk" > "orbin-${VERSION}.apk.sha256" )
          if [ -n "$MAPPING" ]; then
            cp "$MAPPING" "release-staging/orbin-${VERSION}-mapping.txt"
            ( cd release-staging && sha256sum "orbin-${VERSION}-mapping.txt" > "orbin-${VERSION}-mapping.txt.sha256" )
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Generate release notes
        id: notes
        run: |
          set -euo pipefail
          # actions/checkout materializes the tag as a lightweight ref, so the
          # annotated tag object (whose message carries the release name) may be
          # absent. Force-fetch it so %(contents:subject) reads the tag message
          # rather than falling through to the underlying commit subject.
          git fetch --force origin "refs/tags/${GITHUB_REF_NAME}:refs/tags/${GITHUB_REF_NAME}"
          RELEASE_NAME=$(git for-each-ref "refs/tags/${GITHUB_REF_NAME}" --format='%(contents:subject)')
          if [ -z "$RELEASE_NAME" ]; then
            RELEASE_NAME="${GITHUB_REF_NAME}"
          fi
          PREV_TAG=$(git describe --tags --abbrev=0 "${GITHUB_REF_NAME}^" 2>/dev/null || true)
          echo "release_name=${RELEASE_NAME}" >> "$GITHUB_OUTPUT"
          {
            echo "## Orbin ${GITHUB_REF_NAME} - ${RELEASE_NAME}"
            echo
            if [ -n "$PREV_TAG" ]; then
              echo "### Changes since ${PREV_TAG}"
              git log --no-merges --pretty='- %s (%h)' "${PREV_TAG}..${GITHUB_REF_NAME}"
            else
              echo "### Changes"
              git log --no-merges --pretty='- %s (%h)' "${GITHUB_REF_NAME}"
            fi
            echo
            echo "### Verifying downloads"
            echo "Each artifact ships with a \`.sha256\` checksum. Verify with:"
            echo '```'
            echo "sha256sum -c orbin-${GITHUB_REF_NAME}.apk.sha256"
            echo '```'
          } > release-notes.md

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          name: ${{ steps.notes.outputs.release_name }}
          body_path: release-notes.md
          files: |
            release-staging/*.apk
            release-staging/*.sha256
            release-staging/*-mapping.txt
          fail_on_unmatched_files: true
