name: Screenshots

# Records Roborazzi screenshots and uploads them as artifacts so goldens can be reviewed and
# committed. Verification (verifyRoborazziDebug) runs locally / once goldens are checked in.
on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'core/designsystem/**'
      - 'feature/**'

permissions:
  contents: read

jobs:
  record:
    name: Record screenshots
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Record Roborazzi screenshots
        run: ./gradlew recordRoborazziDebug

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: screenshots
          path: '**/src/test/screenshots/**'
          if-no-files-found: ignore
