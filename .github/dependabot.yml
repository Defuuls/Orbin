version: 2
updates:
  - package-ecosystem: "gradle"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      android-build:
        patterns:
          - "com.android.*"
          - "com.google.devtools.ksp"
          - "org.jetbrains.kotlin.*"
      androidx:
        patterns:
          - "androidx.*"
      media:
        patterns:
          - "androidx.media3:*"
    open-pull-requests-limit: 10

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
