# Compose compiler stability configuration.
# Types listed here are treated as @Stable by the Compose compiler, which lets it skip
# recomposition when their instances are unchanged. Only add types that are genuinely
# immutable or whose mutation always triggers recomposition through other means.

# Kotlinx immutable collections are stable by contract.
kotlinx.collections.immutable.ImmutableList
kotlinx.collections.immutable.ImmutableSet
kotlinx.collections.immutable.ImmutableMap
kotlinx.collections.immutable.PersistentList

# Kotlin standard library value types used in UI state.
kotlin.time.Duration
java.time.Instant
